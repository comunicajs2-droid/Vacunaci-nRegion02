<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Vacunación</title>

<style>

body{
  margin:0;
  font-family:"Segoe UI", Arial;
  background:#0b5c4b;
}

/* HEADER */
.header{
  background:#083c31;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

/* CONTENEDOR APP */
.app-container{
  height:calc(100vh - 60px);
  width:100%;
}

/* IFRAME */
iframe{
  width:100%;
  height:100%;
  border:none;
  background:white;
}

/* LOADING */
.loader{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:18px;
}

</style>
</head>

<body>

<div class="header">
💉 Sistema Integral de Vacunación
</div>

<div class="app-container">

  <div class="loader" id="loader">Cargando sistema...</div>

  <iframe id="appFrame"
    src="https://script.google.com/macros/s/AKfycbzitwYg0jo24U_xmtn1CkKFYpzSYoYB3lKjtpBYzel9VmBLgfDGTapwrkQ8RyrxLszhxQ/exec"
    onload="ocultarLoader()">
  </iframe>

</div>

<script>

function ocultarLoader(){
  document.getElementById("loader").style.display="none";
}

</script>

</body>
</html>
