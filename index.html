<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Vacunación</title>

<style>

body{
  margin:0;
  font-family:"Segoe UI", Arial;
  background:#0b5c4b;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

/* HEADER */
.header{
  font-size:22px;
  font-weight:bold;
  margin-bottom:20px;
  text-align:center;
}

/* BOTON */
.btn{
  background:white;
  color:#0b5c4b;
  padding:15px 25px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  border:none;
  font-size:16px;
  transition:0.3s;
}

.btn:hover{
  background:#e0e0e0;
}

.loader{
  margin-top:20px;
  display:none;
}

</style>
</head>

<body>

<div class="header">
💉 Sistema Integral de Vacunación
</div>

<button class="btn" onclick="abrirSistema()">
Ingresar al sistema
</button>

<div class="loader" id="loader">Cargando sistema...</div>

<script>

function abrirSistema(){

  document.getElementById("loader").style.display="block";

  // 🔥 REDIRECCIÓN REAL (NO iframe)
  window.location.href = "https://script.google.com/macros/s/AKfycbzitwYg0jo24U_xmtn1CkKFYpzSYoYB3lKjtpBYzel9VmBLgfDGTapwrkQ8RyrxLszhxQ/exec";
}

</script>

</body>
</html>
